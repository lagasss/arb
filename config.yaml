# ── Pause flags ─────────────────────────────────────────────────────────────
# Two independent kill switches for iterating on pools/cycles without
# burning gas or flooding the logs. Both default to false. They take
# effect on bot restart (no hot-reload — grep "PAUSE_" in bot.log to
# confirm which state you're in).
#
# pause_tracking: stops the swap-event-driven cycle scorer. Pool state
#   still updates from incoming Swap events (so the graph stays warm),
#   but no cycles are scored, no candidates are evaluated, nothing is
#   logged to arb_observations. Use while tweaking the pool set or
#   cycle-cache filters when you want the bot to stay completely quiet.
#
# pause_trading: scorer runs normally, but the final submission gate is
#   blocked. Every candidate that would have been submitted is instead
#   recorded to arb_observations with reject_reason="paused: trading",
#   so the dashboard shows the shadow trade list without spending gas.
#   Use while tuning profit thresholds, slippage, or pool quality.
pause_tracking: false
pause_trading: true

test_mode: true

